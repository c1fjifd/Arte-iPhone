<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arte iPhone Imports - Cadastro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(180deg, #050505 0%, #0a0a0a 35%, #111111 100%);
    }

    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .input-dark {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.10);
      color: #fff;
      border-radius: 1rem;
      padding: 0.95rem 1rem;
      outline: none;
    }

    .label-dark {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 4px;
      display: block;
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>

<body class="text-white min-h-screen">

<div class="max-w-6xl mx-auto p-4">

  <!-- HEADER -->
  <div class="glass p-4 rounded-2xl flex items-center gap-4 mb-6">
    <img src="images/logo.png" class="h-12" />
    <div>
      <p class="text-xs opacity-50">Cadastro digital</p>
      <h1 class="text-xl font-bold">Arte iPhone Imports</h1>
    </div>
  </div>

  <div class="grid lg:grid-cols-2 gap-6">

    <!-- FORM -->
    <div class="glass p-6 rounded-2xl">

      <h2 class="text-lg font-bold mb-4">Cadastro Cliente</h2>

      <div class="space-y-4">

        <div>
          <label class="label-dark">Nome completo</label>
          <input id="nomeCompleto" class="input-dark">
        </div>

        <div>
          <label class="label-dark">CPF</label>
          <input id="cpf" class="input-dark">
        </div>

        <div>
          <label class="label-dark">E-mail</label>
          <input id="emailCliente" class="input-dark">
        </div>

        <div>
          <label class="label-dark">Telefone</label>
          <input id="telefoneCliente" class="input-dark">
        </div>

        <div>
          <label class="label-dark">CEP</label>
          <input id="cep" class="input-dark">
        </div>

        <div>
          <label class="label-dark">Rua</label>
          <input id="rua" class="input-dark">
        </div>

        <div>
          <label class="label-dark">Número</label>
          <input id="numero" class="input-dark">
        </div>

        <div>
          <label class="label-dark">Complemento</label>
          <input id="complemento" class="input-dark">
        </div>

        <div>
          <label class="label-dark">Bairro</label>
          <input id="bairro" class="input-dark">
        </div>

        <div>
          <label class="label-dark">Cidade</label>
          <input id="cidade" class="input-dark">
        </div>

        <div>
          <label class="label-dark">Estado</label>
          <input id="estado" class="input-dark">
        </div>

      </div>

      <h2 class="text-lg font-bold mt-8 mb-4">Dados do Pagador</h2>

      <div class="space-y-4">

        <div>
          <label class="label-dark">Nome</label>
          <input id="pagadorNome" class="input-dark">
        </div>

        <div>
          <label class="label-dark">E-mail</label>
          <input id="pagadorEmail" class="input-dark">
        </div>

      </div>

      <button id="btn-ir-preview" class="btn-primary w-full mt-6 p-4">
        Revisar dados
      </button>

    </div>

    <!-- LADO DIREITO -->
    <div class="space-y-6">

      <div class="glass p-6 rounded-2xl">
        <h3 class="text-lg font-bold mb-4">Arte iPhone Imports</h3>

        <div class="space-y-4 text-sm">

          <div>
            <p class="opacity-50">CNPJ</p>
            <p>44.691.554/0001-58</p>
          </div>

          <!-- ENDEREÇO LOJA -->
          <div>
            <p class="opacity-50">Endereço da Loja</p>

            <div class="mt-2 border border-white/10 p-3 rounded-xl bg-white/5">
              <p>
                R. 24 de Maio, 36 - República<br>
                São Paulo - SP, 01041-000
              </p>
            </div>
          </div>

          <!-- ENDEREÇO POSTAL -->
          <div>
            <p class="opacity-50">Endereço Postal</p>

            <div class="mt-2 border border-white/10 p-3 rounded-xl bg-white/5">
              <p>
                Av. Ipiranga, 1097 - Conj. 84<br>
                Centro<br>
                São Paulo - SP<br>
                CEP: 01039-904
              </p>
            </div>
          </div>

        </div>
      </div>

    </div>

  </div>

</div>

<script type="module" src="assets/app.js"></script>

</body>
</html>
